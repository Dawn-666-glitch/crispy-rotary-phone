<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Example</title>
  <style>
    .carousel {
      position: relative;
      width: 600px;
      height: 400px;
      overflow: hidden;
      margin: 40px auto;
      border: 1px solid #ccc;
    }
    .carousel img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .carousel img.active {
      opacity: 1;
    }
    .controls {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .controls button {
      pointer-events: all;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="carousel" id="carousel">
    <img src="https://via.placeholder.com/600x400/ff0000/ffffff?text=Slide+1" class="active" alt="Slide 1">
    <img src="https://via.placeholder.com/600x400/00ff00/ffffff?text=Slide+2" alt="Slide 2">
    <img src="https://via.placeholder.com/600x400/0000ff/ffffff?text=Slide+3" alt="Slide 3">
    <div class="controls">
      <button id="prev">&#9664;</button>
      <button id="next">&#9654;</button>
    </div>
  </div>

  <script>
    const carousel = document.getElementById('carousel');
    const images = carousel.getElementsByTagName('img');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    let current = 0;

    function showImage(index) {
      images[current].classList.remove('active');
      current = (index + images.length) % images.length;
      images[current].classList.add('active');
    }

    prev.addEventListener('click', () => showImage(current - 1));
    next.addEventListener('click', () => showImage(current + 1));

    // auto cycle every 4 seconds
    setInterval(() => showImage(current + 1), 4000);
  </script>
</body>
</html>
